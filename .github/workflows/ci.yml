name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: TypeScript type checking
        run: pnpm type-check

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hedera_social_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6380:6379

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: '5433'
      DB_USERNAME: test
      DB_PASSWORD: test
      DB_DATABASE: hedera_social_test
      REDIS_HOST: localhost
      REDIS_PORT: '6380'
      REDIS_URL: redis://localhost:6380/1
      HEDERA_NETWORK: testnet
      JWT_SECRET: ci-test-jwt-secret-key-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-key-minimum-32-characters
      LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm --filter @hedera-social/api test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: packages/api/coverage/

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter @hedera-social/web test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/

  test-crypto:
    name: Crypto Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run crypto tests
        run: pnpm --filter @hedera-social/crypto test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-coverage
          path: packages/crypto/coverage/

  build:
    name: Build All Packages
    needs: [test-backend, test-frontend, test-crypto]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/api/dist
            packages/shared/dist
            packages/crypto/dist
            apps/web/.next
          retention-days: 7

      - name: Report build sizes
        run: |
          echo "=== Build Size Report ==="
          for dir in packages/api/dist packages/shared/dist packages/crypto/dist apps/web/.next; do
            if [ -d "$dir" ]; then
              echo "$dir: $(du -sh "$dir" | cut -f1)"
            else
              echo "$dir: not found (skipped)"
            fi
          done
