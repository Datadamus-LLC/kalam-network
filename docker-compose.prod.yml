# Hedera Social Platform — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up --build

services:
  # ============================
  # NestJS API
  # ============================
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: hedera-social-api
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      HEDERA_NETWORK: ${HEDERA_NETWORK}
      HEDERA_OPERATOR_ID: ${HEDERA_OPERATOR_ID}
      HEDERA_OPERATOR_KEY: ${HEDERA_OPERATOR_KEY}
      HEDERA_DID_TOKEN_ID: ${HEDERA_DID_TOKEN_ID:-}
      HEDERA_SOCIAL_GRAPH_TOPIC: ${HEDERA_SOCIAL_GRAPH_TOPIC:-}
      HEDERA_KYC_ATTESTATION_TOPIC: ${HEDERA_KYC_ATTESTATION_TOPIC:-}
      HEDERA_ANNOUNCEMENTS_TOPIC: ${HEDERA_ANNOUNCEMENTS_TOPIC:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      MIRSAD_KYC_ENABLED: ${MIRSAD_KYC_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-log}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hedera-network
    restart: always

  # ============================
  # Next.js Web Frontend
  # ============================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hedera-social-web
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_HEDERA_NETWORK: ${NEXT_PUBLIC_HEDERA_NETWORK:-testnet}
      NEXT_PUBLIC_ENABLE_CHAT: ${NEXT_PUBLIC_ENABLE_CHAT:-true}
      NEXT_PUBLIC_ENABLE_KYC: ${NEXT_PUBLIC_ENABLE_KYC:-true}
      NEXT_PUBLIC_ENABLE_PAYMENTS: ${NEXT_PUBLIC_ENABLE_PAYMENTS:-true}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - hedera-network
    restart: always

  # ============================
  # PostgreSQL
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: hedera-social-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hedera-network
    restart: always

  # ============================
  # Redis
  # ============================
  redis:
    image: redis:7-alpine
    container_name: hedera-social-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hedera-network
    restart: always

networks:
  hedera-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
